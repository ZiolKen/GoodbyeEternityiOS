name: "Build iOS Unsigned iPA"

on: [push]

jobs:
  build_ios:
    runs-on: macos-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: checkout repository
        uses: actions/checkout@v4
      - name: build archive and ipaify
        run: |
          echo $ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION
          echo $FORCE_JAVASCRIPT_ACTIONS_TO_NODE24
          node -v
          set -xe
          wget -O archive.zip "https://www.dropbox.com/scl/fi/b70ynvpu7nr7zk3ajy0xw/GEX.zip?rlkey=sc2p2aalbvmdu0pbumkaxybw1&st=0w7ltcuw&dl=1"
          unzip -o archive.zip -d .
          xcodebuild -list -project "Goodbye Eternity.xcodeproj"
          xcodebuild archive \
            -project "Goodbye Eternity.xcodeproj" \
            -scheme "Goodbye Eternity" \
            -archivePath "Goodbye Eternity.xcarchive" \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO
          mkdir Payload
          mv Goodbye\ Eternity.xcarchive/Products/Applications/*.app Payload/
          zip -r GoodbyeEternity-0.13.5-iOS.ipa Payload
          mv GoodbyeEternity-0.13.5-iOS.ipa ${{ runner.temp }}/GoodbyeEternity-0.13.5-iOS.ipa
      - name: upload application
        uses: actions/upload-artifact@v4
        with:
          name: "Goodbye Eternity"
          path: ${{ runner.temp }}/GoodbyeEternity-0.13.5-iOS.ipa
          # You can also archive the entire directory
          # Path: ${{ runner.temp }}/build
          retention-days: 3