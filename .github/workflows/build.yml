name: "Build iOS Unsigned iPA"

on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build_ios:
    runs-on: macos-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v4
      - name: build archive and ipaify
        run: |
          echo $FORCE_JAVASCRIPT_ACTIONS_TO_NODE24
          echo $ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION
          node -v
          set -xe
          wget -O archive.zip "https://www.dropbox.com/scl/fi/24ghjyr0qo6yr6zdyz8fk/TL45.zip?rlkey=pqezilmf9vk0gsxdv84n081q2&st=af4rc4la&dl=1"
          unzip -o archive.zip -d .
          xcodebuild -list -project "Train45.xcodeproj"
          xcodebuild archive \
            -project "Train45.xcodeproj" \
            -scheme "Train45" \
            -archivePath "Train45.xcarchive" \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO
          mkdir Payload
          mv Train45.xcarchive/Products/Applications/*.app Payload/
          zip -r Train45-v1.02-iOS.ipa Payload
          mv Train45-v1.02-iOS.ipa ${{ runner.temp }}/Train45-v1.02-iOS.ipa
      - name: upload application
        uses: actions/upload-artifact@v4
        with:
          name: "Train45"
          path: ${{ runner.temp }}/Train45-v1.02-iOS.ipa
          # You can also archive the entire directory
          # Path: ${{ runner.temp }}/build
          retention-days: 3
